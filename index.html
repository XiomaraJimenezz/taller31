<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Taller 3-1</title>
</head>
<body>
    <h2>Algoritmo de Cohen-Sutherland</h2>
    <div class="controls">
        xmin:
        <input type="number" id="winXmin" value="100">
        ymin:
        <input type="number" id="winYmin" value="100">
        xmax:
        <input type="number" id="winXmax" value="400">
        ymax:
        <input type="number" id="winYmax" value="300">
        <button>
            Actualizar
        </button>
    </div>
    <canvas id="canvas"
            width="500"
            height="400">
    </canvas>
    <div class="navigation">

        <button>|<</button>
        <button><</button>
        <button>></button>
        <button>>|</button>
    </div>
    <div id="info"></div>
    <script src="script.js"></script>
</body>
</html>
<button onclick="changeScene(0)">|<</button>
<button onclick="prevScene()"><</button>
<button onclick="nextScene()">></button>
<button onclick="changeScene(lines.length - 1)">>|</button>
<button onclick="updateWindow()">
    Actualizar
</button>
